function formatPhone(v) {
  const n = v.replace(/[^0-9]/g,"").slice(0,11);
  if (n.length < 4) return n;
  if (n.length < 8) return `${n.slice(0,3)}-${n.slice(3)}`;
  return `${n.slice(0,3)}-${n.slice(3,7)}-${n.slice(7)}`;
}
function maskPhone(v) {
  const n = v.replace(/[^0-9]/g,"");
  if (n.length < 8) return v || "—";
  return `${n.slice(0,3)}-••••-${n.slice(7)}`;
}

  input::placeholder { color: rgba(255,255,255,.25); }
`;

// ── 서브 컴포넌트 ──────────────────────────────────────
function Field({ label, optional, children }) {
  return (
    <div style={{ marginBottom:16 }}>
      <label style={S.label}>{label} {optional && <span style={{ color:"#B8AE9F" }}>(선택)</span>}</label>
      {children}
    </div>
  );
}
function PrefillRow({ k, v, dark, accent }) {
  return (
    <div style={S.prefillRow}>
      <span style={{ color: dark ? "rgba(255,255,255,.45)" : T.sub }}>{k}</span>
      <span style={{ color: dark ? "rgba(255,255,255,.85)" : T.ink }}>{v} <span style={{ color: accent || T.green }}>✓</span></span>
    </div>
  );
}
function UnlockRow({ icon, title, body }) {
  return (
    <div style={S.unlockRow}>
      <span style={{ fontSize:18 }}>{icon}</span>
      <div>
        <div style={{ fontWeight:600, fontSize:13, color:T.ink }}>{title}</div>
        <div style={{ fontSize:12, color:T.sub, marginTop:2, lineHeight:1.5 }}>{body}</div>
      </div>
    </div>
  );
}

// ── 화면 ────────────────────────────────────────────────
function Intro({ user, setUser, onStart }) {
  const valid = user.name.trim().length > 0 && user.phone.replace(/[^0-9]/g,"").length >= 10 && user.gender !== "";
  const interests = ["사주 연애 상담", "3코어 매직", "잘 모르겠어요"];
  return (
    <div className="fade-in" style={{ background:"#0E0816", minHeight:"100vh" }}>
      {/* 히어로 이미지 영역 */}
      <div style={{ position:"relative", width:"100%", height:"85vw", maxHeight:480, overflow:"hidden" }}>
        <img src="images/intro-hero.png" alt="" style={{ width:"100%", height:"100%", objectFit:"cover", objectPosition:"center 25%" }}/>
        {/* 상단 그라데이션 오버레이 */}
        <div style={{ position:"absolute", inset:0, background:"linear-gradient(to bottom, rgba(14,8,22,.3) 0%, rgba(14,8,22,0) 40%, rgba(14,8,22,.85) 80%, #0E0816 100%)" }}/>
        {/* 브랜드 + 카피 */}
        <div style={{ position:"absolute", top:18, left:20 }}>
          <div style={{ display:"flex", alignItems:"center", gap:7 }}>
            <span style={{ width:7, height:7, borderRadius:"50%", background:"#C084FC", display:"inline-block" }}/>
            <span style={{ fontSize:12, fontWeight:700, color:"rgba(255,255,255,.8)", letterSpacing:".5px", fontFamily:FONT }}>이음나루</span>
          </div>
        </div>
        {/* 왼쪽 상단 말풍선 카피 */}
        <div style={{ position:"absolute", top:20, left:20, maxWidth:180 }}>
          <div style={{ marginTop:28, background:"rgba(255,255,255,.08)", backdropFilter:"blur(8px)", border:"1px solid rgba(255,255,255,.15)", borderRadius:"0 14px 14px 14px", padding:"12px 14px" }}>
            <p style={{ fontSize:13, color:"#F3E8FF", lineHeight:1.6, fontFamily:FONT, fontWeight:500 }}>
              나는 연애할 때<br/>어떤 사람일까?
            </p>
          </div>
        </div>
        {/* 하단 타이틀 */}
        <div style={{ position:"absolute", bottom:16, left:20, right:20 }}>
          <div style={{ fontSize:11, fontWeight:700, color:"#C084FC", letterSpacing:"2px", fontFamily:FONT, marginBottom:6 }}>연애 심리 테스트</div>
          <h1 style={{ fontSize:26, fontWeight:800, color:"#fff", lineHeight:1.3, fontFamily:FONT }}>
            나의 연애 유형<br/>알아보기
          </h1>
        </div>
      </div>

      {/* 폼 영역 */}
      <div style={{ padding:"20px 22px 36px" }}>
        <p style={{ fontSize:14, color:"rgba(255,255,255,.5)", lineHeight:1.6, marginBottom:24, fontFamily:FONT }}>

        </p>

        {/* 이름 */}
        <div style={{ marginBottom:14 }}>
          <label style={{ display:"block", fontSize:12, color:"rgba(255,255,255,.45)", marginBottom:7, fontWeight:500, fontFamily:FONT }}>이름</label>
          <input style={{ ...S.input, background:"rgba(255,255,255,.07)", border:"1.5px solid rgba(255,255,255,.12)", color:"#fff", borderRadius:12 }}
            placeholder="홍길동" value={user.name} onChange={e=>setUser({...user,name:e.target.value})}/>
        </div>

        {/* 연락처 */}
        <div style={{ marginBottom:14 }}>
          <label style={{ display:"block", fontSize:12, color:"rgba(255,255,255,.45)", marginBottom:7, fontWeight:500, fontFamily:FONT }}>연락처</label>
          <input style={{ ...S.input, background:"rgba(255,255,255,.07)", border:"1.5px solid rgba(255,255,255,.12)", color:"#fff", borderRadius:12 }}
            placeholder="010-0000-0000" inputMode="numeric" value={user.phone} onChange={e=>setUser({...user,phone:formatPhone(e.target.value)})}/>
        </div>

        {/* 성별 */}
        <div style={{ marginBottom:14 }}>
          <label style={{ display:"block", fontSize:12, color:"rgba(255,255,255,.45)", marginBottom:7, fontWeight:500, fontFamily:FONT }}>성별</label>
          <div style={{ display:"flex", gap:10 }}>
            {[{ val:"여자", emoji:"👩" }, { val:"남자", emoji:"👨" }].map(({ val, emoji }) => {

          <div style={S.chips}>

              const on = user.interest === it;

function Quiz({ q, index, total, onAnswer }) {
  const pct = Math.round((index/total)*100);
  return (
    <div style={{ ...S.pad, background:"#0E0816", minHeight:"100vh" }} className="fade-in" key={index}>
      <div style={S.progressTop}>
        <span style={S.qcount}>Q{index+1} <span style={{ color:T.line }}>/ {total}</span></span>
        <div style={S.bar}><div style={{ ...S.barFill, width:`${pct+100/total}%` }}/></div>
      </div>
      <div style={{ height:28 }}/>
      <h2 style={S.qtext}>{q.q}</h2>
      <div style={{ height:20 }}/>
      <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
        {q.options.map((op,i) => (
          <button key={i} onClick={()=>onAnswer(op.score)} style={S.option} className="option-btn">
            <span style={S.optionLetter}>{String.fromCharCode(65+i)}</span>
            <span>{op.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

function Result({ type, user, onApply }) {
  const [slide, setSlide] = React.useState(0);
  const TOTAL = 5;
  const c = type.color;
  const imgSrc = `images/result-${type.key}-${user.gender === "남자" ? "male" : "female"}.png`;

    i < arr.length - 1 ? s + '.' : s
  ).filter(s => s.length > 3);

  const NavBtn = ({ label }) => (
    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", marginTop:8 }}>

    </div>

        <div style={{ fontSize:11, color:"rgba(255,255,255,.35)", letterSpacing:"1.5px", fontWeight:600 }}>연애 유형 결과</div>

            <div style={{ fontSize:13, color:"rgba(255,255,255,.35)", marginBottom:30 }}>공감가는 부분이 분명 있을 거예요</div>

              <div style={{ flex:1, height:1, background:"rgba(255,255,255,.08)" }}/>
            </div>
            <div style={{ marginBottom:36 }}>
              {descSentences.slice(Math.ceil(descSentences.length/2)).map((s, i) => (

        {slide === 2 && (

            <div style={{ fontSize:17, fontWeight:700, color:"#fff", marginBottom:6 }}>이거 다 공감되죠? 😏</div>
            <div style={{ fontSize:13, color:"rgba(255,255,255,.35)", marginBottom:32 }}>솔직히 맞는 말만 써놨어요</div>
            <div style={{ display:"flex", flexDirection:"column", marginBottom:36 }}>
              {type.traits.map((t, i) => (
                <div key={i} style={{ display:"flex", gap:18, alignItems:"flex-start", paddingTop: i>0?24:0, marginTop: i>0?24:0, borderTop: i>0 ? "1px solid rgba(255,255,255,.07)" : "none" }}>

            <div style={{ borderLeft:`3px solid ${c.accent}`, paddingLeft:20, marginBottom:36 }}>

              <div style={{ filter:"blur(6px)", padding:"4px", fontSize:15.5, color:"rgba(255,255,255,.9)", lineHeight:1.9, userSelect:"none" }}>
                {type.match}
              </div>
              <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center" }}>
                <span style={{ fontSize:13, fontWeight:600, color:c.accent, background:"rgba(0,0,0,.65)", padding:"10px 22px", borderRadius:22, border:`1px solid ${c.accent}55` }}>🔒 신청하면 공개돼요</span>
              </div>
            </div>
            <div style={{ flex:1, minHeight:24 }}/>
            <NavBtn label="다음"/>
          </div>
        )}

        {/* ── 슬라이드 5: 나를 알아보기 신청 ── */}
        {slide === 4 && (
          <div style={{ flex:1, padding:"28px 24px 40px", display:"flex", flexDirection:"column" }}>
            <div style={{ marginBottom:30 }}>
              <div style={{ fontSize:24, fontWeight:800, color:"#fff", lineHeight:1.45, marginBottom:12 }}>

              </div>

            </div>
            <div style={{ marginBottom:28 }}>
              <div style={{ fontSize:11, color:c.accent, fontWeight:700, letterSpacing:"2px", marginBottom:18 }}>신청하면 공개되는 것들</div>
              {[["💞","나와 가장 잘 맞는 연애 유형"],["⚠️","내가 빠지기 쉬운 연애 함정 전체"],["🗓️","올해 인연이 들어오는 시기"],["💌","나에게 맞는 연애 시작법"]].map(([icon, text], i) => (
                <div key={i} style={{ display:"flex", gap:14, alignItems:"center", padding:"13px 0", borderBottom: i < 3 ? "1px solid rgba(255,255,255,.07)" : "none" }}>
                  <span style={{ fontSize:18 }}>{icon}</span>

            </div>
            <button onClick={onApply} style={{ ...S.cta, background:c.chip, boxShadow:"none", fontSize:17 }}>신청하고 나를 더 알아보기</button>

        )}

      </div>
    </div>
  );
}

function Done({ type, user, onReset }) {
  return (
    <div style={S.pad} className="fade-in">
      <div style={{ height:30 }}/>
      <div style={S.doneCheck}>✓</div>
      <h2 style={{ ...S.h1, textAlign:"center", fontSize:24 }}>신청 완료!</h2>
      <p style={{ ...S.lead, textAlign:"center" }}>{user.name}님, 신청이 접수됐어요.<br/>곧 입력하신 번호로 안내드릴게요.</p>
      <div style={S.unlockCard}>
        <div style={S.unlockTitle}>🔓 잠겼던 전체 결과</div>
        <UnlockRow icon="⚠️" title="빠지기 쉬운 연애 함정"   body={type.trap}/>
        <UnlockRow icon="💞" title="환상의 궁합 유형"         body={type.match}/>
        <UnlockRow icon="🗓️" title="올해 인연 들어오는 시기" body="늦봄~초여름, 익숙한 공간에서 예상치 못한 인연이 시작돼요."/>
      </div>
      <button onClick={onReset} style={S.ctaGhost}>다시 테스트하기</button>
    </div>
  );
}

// ── 메인 ────────────────────────────────────────────────
function LoveTypeTest() {
  const [step, setStep] = React.useState("intro");
  const [user, setUser] = React.useState({ name:"", phone:"", interest:"사주 연애 상담", gender:"" });
  const [qIndex, setQIndex] = React.useState(0);
  const [scores, setScores] = React.useState({ keeper:0, hunter:0, cool:0, grandma:0 });
  const [resultType, setResultType] = React.useState(null);

  const computeResult = (s) => {
    let best="keeper", max=-1;
    Object.entries(s).forEach(([k,v]) => { if(v>max){max=v;best=k;} });
    return TYPES[best];
  };

  const handleAnswer = (scoreKey) => {
    const next = { ...scores, [scoreKey]: scores[scoreKey]+1 };
    setScores(next);
    if (qIndex+1 < QUESTIONS.length) { setQIndex(qIndex+1); }
    else { setResultType(computeResult(next)); setStep("result"); }
  };

  const resetAll = () => {
    setStep("intro"); setUser({name:"",phone:"",interest:"사주 연애 상담"});
    setQIndex(0); setScores({keeper:0,hunter:0,cool:0,grandma:0}); setResultType(null);
  };

  const isFullscreen = step === "intro" || step === "result";
  return (
    <div style={{ ...S.viewport, alignItems: isFullscreen ? "flex-start" : "center", padding: isFullscreen ? 0 : "24px 12px" }}>
      <style>{globalCss}</style>
      <div style={isFullscreen ? S.phone : S.phoneLight}>
        {step==="intro"  && <Intro user={user} setUser={setUser} onStart={()=>setStep("quiz")}/>}
        {step==="quiz"   && <Quiz q={QUESTIONS[qIndex]} index={qIndex} total={QUESTIONS.length} onAnswer={handleAnswer}/>}
        {step==="result" && <Result type={resultType} user={user} onApply={()=>setStep("done")}/>}
        {step==="done"   && <Done type={resultType} user={user} onReset={resetAll}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<LoveTypeTest/>);
