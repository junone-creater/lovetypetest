function formatPhone(v) {
  const n = v.replace(/[^0-9]/g,"").slice(0,11);
  if (n.length < 4) return n;
  if (n.length < 8) return `${n.slice(0,3)}-${n.slice(3)}`;
  return `${n.slice(0,3)}-${n.slice(3,7)}-${n.slice(7)}`;
}
function maskPhone(v) {
  const n = v.replace(/[^0-9]/g,"");
  if (n.length < 8) return v || "—";
  return `${n.slice(0,3)}-••••-${n.slice(7)}`;
}

        {slide === 4 && (

            {/* 1위 캐릭터 배경 이미지 */}
            <img src={imgSrc} alt="" style={{ position:"absolute", right:-30, bottom:0, width:"65%", maxWidth:260, opacity:0.13, filter:"grayscale(30%)", pointerEvents:"none", zIndex:0 }} onError={e=>{e.target.style.display="none";}}/>
            {/* 콘텐츠 */}
            <div style={{ flex:1, padding:"28px 24px 40px", display:"flex", flexDirection:"column", position:"relative", zIndex:1 }}>
            <div style={{ marginBottom:26 }}>
              <div style={{ fontSize:24, fontWeight:800, color:"#fff", lineHeight:1.45, marginBottom:12 }}>
                나를 제대로<br/>알아볼 시간이에요
              </div>
              <div style={{ fontSize:14.5, color:"rgba(255,255,255,.5)", lineHeight:1.8 }}>
                유형을 아는 것보다,<br/><span style={{ color:c.accent, fontWeight:600 }}>어떻게 써야 하는지</span>가 중요하거든요
              </div>
            </div>

            {/* 블러 처리된 "상담에서 알게 되는 것들" */}
            <div style={{ marginBottom:22 }}>
              <div style={{ fontSize:11, color:c.accent, fontWeight:700, letterSpacing:"2px", marginBottom:14 }}>심리 분석으로 알게 되는 것들</div>
              <div style={{ position:"relative", borderRadius:14, overflow:"hidden" }}>
                <div style={{ padding:"18px 20px", background:"rgba(255,255,255,.07)", filter:"blur(4px)", userSelect:"none" }}>
                  {[
                    ["🔄", `${first.name}이 연애에서 반복하는 패턴과 해결법`],
                    ["⚡", "지금 당장 바꿀 수 있는 행동 딱 1가지"],
                    ["💞", "나와 실제로 잘 맞는 상대의 특징"],
                    ["🗝️", "연애 자신감을 되찾는 나만의 방법"],
                  ].map(([icon, text], i) => (
                    <div key={i} style={{ display:"flex", gap:12, alignItems:"center", padding:"10px 0", borderBottom: i<3?"1px solid rgba(255,255,255,.07)":"none" }}>
                      <span style={{ fontSize:16 }}>{icon}</span>
                      <span style={{ fontSize:14, color:"rgba(255,255,255,.85)" }}>{text}</span>
                    </div>
                  ))}
                </div>
                <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center" }}>
                  <span style={{ fontSize:13, fontWeight:600, color:c.accent, background:"rgba(0,0,0,.72)", padding:"10px 20px", borderRadius:22, border:`1px solid ${c.accent}55` }}>🔒 더알아보기 후 공개돼요</span>
                </div>
              </div>
            </div>

            {/* 3코어 매직 */}
            <div style={{ padding:"18px 20px", background:`linear-gradient(135deg, ${c.chip}55, ${c.chip}22)`, border:`1px solid ${c.accent}33`, borderRadius:14, marginBottom:22 }}>
              <div style={{ fontSize:12, fontWeight:700, color:c.accent, letterSpacing:"1.5px", marginBottom:6 }}>이음나루 · 3코어 매직</div>
              <div style={{ fontSize:14.5, fontWeight:700, color:"#fff", lineHeight:1.5, marginBottom:6 }}>나를 알면, 연애가 달라져요</div>
              <p style={{ fontSize:13, color:"rgba(255,255,255,.6)", lineHeight:1.8, margin:0 }}>
                내 유형의 핵심을 꿰뚫는 <span style={{ color:c.accent, fontWeight:600 }}>3가지 코어</span>를 알면 — 왜 이 패턴이 반복됐는지, 어떻게 바꿀 수 있는지가 보여요.
              </p>
            </div>

            <button onClick={onApply} style={{ ...S.cta, background:c.chip, boxShadow:"none", fontSize:17 }}>정확한 심리 분석 더알아보기</button>
            <p style={{ ...S.fineprint, color:"rgba(255,255,255,.3)" }}>이음나루 심리 분석으로 연애 패턴을 바꿔보세요</p>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}


function Done({ result, user, onReset }) {
  const type = result.first;
  const [copied, setCopied] = React.useState(false);

  const handleShare = async () => {
    const shareUrl = "https://junone-creater.github.io/lovetypetest/";
    const shareText = `나의 연애 유형은 '${type.name}'! 당신도 테스트해보세요 👇`;
    if (navigator.share) {
      try {
        await navigator.share({ title:"이음나루 연애유형 테스트", text:shareText, url:shareUrl });
      } catch(e) {}
    } else {
      try {
        await navigator.clipboard.writeText(`${shareText}\n${shareUrl}`);
        setCopied(true);
        setTimeout(() => setCopied(false), 2500);
      } catch(e) {}
    }
  };

  return (
    <div style={S.pad} className="fade-in">
      <div style={{ height:30 }}/>
      <div style={S.doneCheck}>✓</div>
      <h2 style={{ ...S.h1, textAlign:"center", fontSize:24 }}>전체 결과 공개!</h2>
      <p style={{ ...S.lead, textAlign:"center" }}>{user.name}님의 연애 유형<br/>전체 분석 결과예요.</p>
      <div style={S.unlockCard}>
        <div style={S.unlockTitle}>🔓 잠겼던 전체 결과</div>
        <UnlockRow icon="🥇" title={`1위 유형 — ${type.name}`} body={`"${type.tagline}" ${type.desc.slice(0,60)}...`}/>
        <UnlockRow icon="⚠️" title="빠지기 쉬운 연애 함정"   body={type.trap}/>
        <UnlockRow icon="💞" title="환상의 궁합 유형"         body={type.match}/>
        <UnlockRow icon="🗓️" title="올해 인연 들어오는 시기" body="늦봄~초여름, 익숙한 공간에서 예상치 못한 인연이 시작돼요."/>
      </div>

      {/* 공유하기 */}
      <div style={{ marginTop:22, padding:"18px", background:"#F3E8FF", borderRadius:16, textAlign:"center" }}>
        <div style={{ fontSize:14, fontWeight:700, color:"#6B3FA0", marginBottom:4 }}>친구도 테스트해볼 수 있게 공유해요!</div>
        <div style={{ fontSize:12, color:"#9B70C0", marginBottom:14 }}>나는 '{type.name}'— 친구는 어떤 유형일까요?</div>
        <button onClick={handleShare} style={{ width:"100%", padding:"13px", borderRadius:12, border:"none", background:"#6B3FA0", color:"#fff", fontSize:15, fontWeight:700, cursor:"pointer", fontFamily:FONT }}>
          {copied ? "링크 복사됐어요 ✓" : "친구에게 공유하기 🔗"}
        </button>
      </div>

      <button onClick={onReset} style={S.ctaGhost}>다시 테스트하기</button>
    </div>
  );
}

// ── 메인 ────────────────────────────────────────────────
function LoveTypeTest() {
  const [step, setStep] = React.useState("intro");
  const [user, setUser] = React.useState({ name:"", age:"", gender:"", agreed:false });
  const [qIndex, setQIndex] = React.useState(0);
  const [scores, setScores] = React.useState({ keeper:0, hunter:0, cool:0, grandma:0, romantic:0, analyst:0, mirror:0, rescuer:0, ghost:0 });
  const [resultType, setResultType] = React.useState(null);

  const computeResult = (s) => {
    const sorted = Object.entries(s).sort((a, b) => b[1] - a[1]).map(([k]) => TYPES[k]);
    return { first: sorted[0], second: sorted[1], third: sorted[2] };
  };

  const handleAnswer = (scoreKey) => {
    const next = { ...scores, [scoreKey]: scores[scoreKey]+1 };
    setScores(next);
    if (qIndex+1 < QUESTIONS.length) { setQIndex(qIndex+1); }
    else { setResultType(computeResult(next)); setStep("result"); }
  };

  const resetAll = () => {
    setStep("intro"); setUser({name:"",age:"",gender:"",agreed:false});
    setQIndex(0); setScores({keeper:0,hunter:0,cool:0,grandma:0,romantic:0,analyst:0,mirror:0,rescuer:0,ghost:0}); setResultType(null);
  };

  const isFullscreen = step === "intro" || step === "result";
  return (
    <div style={{ ...S.viewport, alignItems: isFullscreen ? "flex-start" : "center", padding: isFullscreen ? 0 : "24px 12px" }}>
      <style>{globalCss}</style>
      <div style={isFullscreen ? S.phone : S.phoneLight}>
        {step==="intro"  && <Intro user={user} setUser={setUser} onStart={()=>setStep("quiz")}/>}
        {step==="quiz"   && <Quiz q={QUESTIONS[qIndex]} index={qIndex} total={QUESTIONS.length} onAnswer={handleAnswer}/>}
        {step==="result" && <Result result={resultType} user={user} onApply={()=>setStep("done")}/>}
        {step==="done"   && <Done result={resultType} user={user} onReset={resetAll}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<LoveTypeTest/>);
  </script>
