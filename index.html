function formatPhone(v) {
  const n = v.replace(/[^0-9]/g,"").slice(0,11);
  if (n.length < 4) return n;
  if (n.length < 8) return `${n.slice(0,3)}-${n.slice(3)}`;
  return `${n.slice(0,3)}-${n.slice(3,7)}-${n.slice(7)}`;
}
function maskPhone(v) {
  const n = v.replace(/[^0-9]/g,"");
  if (n.length < 8) return v || "—";
  return `${n.slice(0,3)}-••••-${n.slice(7)}`;
}

function Apply({ result, user, applyInfo, setApplyInfo, onDone }) {
  const [step, setStep] = React.useState(1);
  const type = result.first;
  const c = type.color;
  const SHEET_URL = "https://script.google.com/macros/s/AKfycbz-YnjRG3BKwCG3KyNCXHr0pVKEO33fkgWUC9-bX8DmXnEGc-w0Jj7aKU91K6kp1DXX/exec";
  const canNext = step===1 ? applyInfo.phone.replace(/[^0-9]/g,"").length>=10
                : step===2 ? applyInfo.location.trim().length>=2
                : applyInfo.concern.trim().length>=5;
  const sendToSheet = () => {
    const data = {
      name: user.name, age: user.age, gender: user.gender,
      first: result.first.name, second: result.second.name, third: result.third.name,
      phone: applyInfo.phone, location: applyInfo.location, concern: applyInfo.concern
    };
    try {
      const iframe = document.createElement('iframe');
      iframe.name = 'sheet_iframe';
      iframe.style.cssText = 'display:none;width:0;height:0;border:0;position:absolute;';
      document.body.appendChild(iframe);
      const form = document.createElement('form');
      form.method = 'GET';
      form.action = SHEET_URL;
      form.target = 'sheet_iframe';
      Object.entries(data).forEach(([k, v]) => {
        const input = document.createElement('input');
        input.type = 'hidden';
        input.name = k;
        input.value = v || '';
        form.appendChild(input);
      });
      document.body.appendChild(form);
      form.submit();
      setTimeout(() => {
        try { document.body.removeChild(form); document.body.removeChild(iframe); } catch(e) {}
      }, 5000);
    } catch(e) {}
  };
  const handleNext = () => {
    if (step < 3) { setStep(s => s + 1); return; }
    sendToSheet();
    onDone();
  };
  const inputStyle = { ...S.input, background:"rgba(255,255,255,.1)", border:`1.5px solid ${c.accent}44`, color:"#fff", borderRadius:14, fontSize:16, padding:"16px 18px" };

  return (
    <div style={{ background:c.bg, minHeight:"100vh", display:"flex", flexDirection:"column" }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"18px 22px 0" }}>
        <div style={{ fontSize:11, color:"rgba(255,255,255,.35)", letterSpacing:"1.5px", fontWeight:600 }}>신청 정보</div>
        <div style={{ fontSize:13, fontWeight:700, color:c.accent }}>{step} / 3</div>
      </div>
      <div style={{ display:"flex", gap:6, justifyContent:"center", padding:"12px 0 0" }}>
        {[1,2,3].map(i=>(
          <div key={i} style={{ height:5, borderRadius:3, background:i<=step?c.accent:"rgba(255,255,255,.18)", width:i===step?22:6, transition:"all .3s ease" }}/>
        ))}
      </div>

      <div key={step} className="fade-in" style={{ flex:1, padding:"36px 24px 40px", display:"flex", flexDirection:"column" }}>

        {step===1 && <>
          <div style={{ fontSize:22, fontWeight:800, color:"#fff", lineHeight:1.4, marginBottom:10 }}>연락처를<br/>알려주세요</div>
          <div style={{ fontSize:14, color:"rgba(255,255,255,.4)", marginBottom:32, lineHeight:1.7 }}>결과와 맞춤 연애 조언을<br/>문자로 바로 보내드려요</div>
          <input style={{ ...inputStyle, fontSize:18, letterSpacing:"1.5px" }}
            placeholder="010-0000-0000" inputMode="numeric"
            value={applyInfo.phone}
            onChange={e=>setApplyInfo({...applyInfo,phone:formatPhone(e.target.value)})}
          />
          <div style={{ flex:1 }}/>
        </>}

        {step===2 && <>
          <div style={{ fontSize:22, fontWeight:800, color:"#fff", lineHeight:1.4, marginBottom:10 }}>거주 지역을<br/>알려주세요</div>
          <div style={{ fontSize:14, color:"rgba(255,255,255,.4)", marginBottom:10, lineHeight:1.7 }}>동 단위까지 적어주시면 더 잘 안내해드릴 수 있어요</div>
          <div style={{ fontSize:12, color:"rgba(255,255,255,.25)", marginBottom:28 }}>예) 서울 마포구 합정동 · 경기 성남시 분당구</div>
          <input style={inputStyle}
            placeholder="예) 서울 마포구 합정동"
            value={applyInfo.location}
            onChange={e=>setApplyInfo({...applyInfo,location:e.target.value})}
          />
          <div style={{ flex:1 }}/>
        </>}

        {step===3 && <>
          <div style={{ fontSize:22, fontWeight:800, color:"#fff", lineHeight:1.4, marginBottom:10 }}>해결하고 싶은<br/>고민을 적어주세요</div>
          <div style={{ fontSize:14, color:"rgba(255,255,255,.4)", marginBottom:10, lineHeight:1.7 }}>편하게 적어주시면 돼요<br/>전문가가 꼼꼼히 읽고 연락드려요</div>
          <div style={{ fontSize:12, color:"rgba(255,255,255,.25)", marginBottom:28 }}>예) 좋아하는 사람이 생겼는데 어떻게 시작해야 할지 모르겠어요</div>
          <textarea
            style={{ ...inputStyle, minHeight:160, resize:"none", lineHeight:1.75 }}
            placeholder="고민을 자유롭게 적어주세요..."
            value={applyInfo.concern}
            onChange={e=>setApplyInfo({...applyInfo,concern:e.target.value})}
          />
          <div style={{ flex:1 }}/>
        </>}

        <button onClick={handleNext} disabled={!canNext} style={{ ...S.cta, background:canNext?c.chip:"rgba(255,255,255,.1)", color:canNext?"#fff":"rgba(255,255,255,.3)", boxShadow:"none", cursor:canNext?"pointer":"not-allowed", fontSize:17, marginTop:28 }}>
          {step<3 ? "다음" : "신청 완료"}
        </button>
        <p style={{ ...S.fineprint, color:"rgba(255,255,255,.25)", marginTop:12 }}>입력하신 정보는 결과 안내 외 사용되지 않아요</p>
      </div>
    </div>
  );
}

function Done({ result, user, onReset }) {
  const type = result.first;
  return (
    <div style={S.pad} className="fade-in">
      <div style={{ height:30 }}/>
      <div style={S.doneCheck}>✓</div>
      <h2 style={{ ...S.h1, textAlign:"center", fontSize:24 }}>신청 완료!</h2>
      <p style={{ ...S.lead, textAlign:"center" }}>{user.name}님, 신청이 접수됐어요.<br/>곧 담당자가 직접 연락드릴게요.</p>
      <div style={S.unlockCard}>
        <div style={S.unlockTitle}>🔓 잠겼던 전체 결과</div>
        <UnlockRow icon="🥇" title={`1위 유형 — ${type.name}`} body={`"${type.tagline}" ${type.desc.slice(0,60)}...`}/>
        <UnlockRow icon="⚠️" title="빠지기 쉬운 연애 함정"   body={type.trap}/>
        <UnlockRow icon="💞" title="환상의 궁합 유형"         body={type.match}/>
        <UnlockRow icon="🗓️" title="올해 인연 들어오는 시기" body="늦봄~초여름, 익숙한 공간에서 예상치 못한 인연이 시작돼요."/>
      </div>
      <button onClick={onReset} style={S.ctaGhost}>다시 테스트하기</button>
    </div>
  );
}

// ── 메인 ────────────────────────────────────────────────
function LoveTypeTest() {
  const [step, setStep] = React.useState("intro");
  const [user, setUser] = React.useState({ name:"", age:"", gender:"", agreed:false });
  const [applyInfo, setApplyInfo] = React.useState({ phone:"", location:"", concern:"" });
  const [qIndex, setQIndex] = React.useState(0);
  const [scores, setScores] = React.useState({ keeper:0, hunter:0, cool:0, grandma:0, romantic:0, analyst:0, mirror:0, rescuer:0, ghost:0 });
  const [resultType, setResultType] = React.useState(null);

  const computeResult = (s) => {
    const sorted = Object.entries(s).sort((a, b) => b[1] - a[1]).map(([k]) => TYPES[k]);
    return { first: sorted[0], second: sorted[1], third: sorted[2] };
  };

  const handleAnswer = (scoreKey) => {
    const next = { ...scores, [scoreKey]: scores[scoreKey]+1 };
    setScores(next);
    if (qIndex+1 < QUESTIONS.length) { setQIndex(qIndex+1); }
    else { setResultType(computeResult(next)); setStep("result"); }
  };

  const resetAll = () => {
    setStep("intro"); setUser({name:"",age:"",gender:"",agreed:false});
    setApplyInfo({phone:"",location:"",concern:""});
    setQIndex(0); setScores({keeper:0,hunter:0,cool:0,grandma:0,romantic:0,analyst:0,mirror:0,rescuer:0,ghost:0}); setResultType(null);
  };

  const isFullscreen = step === "intro" || step === "result" || step === "apply";
  return (
    <div style={{ ...S.viewport, alignItems: isFullscreen ? "flex-start" : "center", padding: isFullscreen ? 0 : "24px 12px" }}>
      <style>{globalCss}</style>
      <div style={isFullscreen ? S.phone : S.phoneLight}>
        {step==="intro"  && <Intro user={user} setUser={setUser} onStart={()=>setStep("quiz")}/>}
        {step==="quiz"   && <Quiz q={QUESTIONS[qIndex]} index={qIndex} total={QUESTIONS.length} onAnswer={handleAnswer}/>}
        {step==="result" && <Result result={resultType} user={user} onApply={()=>setStep("apply")}/>}
        {step==="apply"  && <Apply result={resultType} user={user} applyInfo={applyInfo} setApplyInfo={setApplyInfo} onDone={()=>setStep("done")}/>}
        {step==="done"   && <Done result={resultType} user={user} applyInfo={applyInfo} onReset={resetAll}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<LoveTypeTest/>);
  </script>
