function LoveTypeTest() {
  const [step, setStep] = React.useState("intro");
  const [user, setUser] = React.useState({ name:"", age:"", gender:"", agreed:false });
  const [applyInfo, setApplyInfo] = React.useState({ phone:"", location:"", concern:"" });
  const [qIndex, setQIndex] = React.useState(0);
  const [scores, setScores] = React.useState({ keeper:0, hunter:0, cool:0, grandma:0, romantic:0, analyst:0, mirror:0, rescuer:0, ghost:0 });
  const [resultType, setResultType] = React.useState(null);

  const computeResult = (s) => {
    const sorted = Object.entries(s).sort((a, b) => b[1] - a[1]).map(([k]) => TYPES[k]);
    return { first: sorted[0], second: sorted[1], third: sorted[2] };
  };

  const handleAnswer = (scoreKey) => {
    const next = { ...scores, [scoreKey]: scores[scoreKey]+1 };
    setScores(next);
    if (qIndex+1 < QUESTIONS.length) { setQIndex(qIndex+1); }
    else { setResultType(computeResult(next)); setStep("result"); }
  };

  const resetAll = () => {
    setStep("intro"); setUser({name:"",age:"",gender:"",agreed:false});
    setApplyInfo({phone:"",location:"",concern:""});
    setQIndex(0); setScores({keeper:0,hunter:0,cool:0,grandma:0,romantic:0,analyst:0,mirror:0,rescuer:0,ghost:0}); setResultType(null);
  };

  const isFullscreen = step === "intro" || step === "result" || step === "apply";
  return (
    <div style={{ ...S.viewport, alignItems: isFullscreen ? "flex-start" : "center", padding: isFullscreen ? 0 : "24px 12px" }}>
      <style>{globalCss}</style>
      <div style={isFullscreen ? S.phone : S.phoneLight}>
        {step==="intro"  && <Intro user={user} setUser={setUser} onStart={()=>setStep("quiz")}/>}
        {step==="quiz"   && <Quiz q={QUESTIONS[qIndex]} index={qIndex} total={QUESTIONS.length} onAnswer={handleAnswer}/>}
        {step==="result" && <Result result={resultType} user={user} onApply={()=>setStep("apply")}/>}
        {step==="apply"  && <Apply result={resultType} user={user} applyInfo={applyInfo} setApplyInfo={setApplyInfo} onDone={()=>setStep("done")}/>}
        {step==="done"   && <Done result={resultType} user={user} applyInfo={applyInfo} onReset={resetAll}/>}
      </div>
    </div>
  );
}
